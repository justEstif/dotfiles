[tools]
node = "22.12.0"
bun = "latest"
go = "latest"
rust = "latest"
usage = "latest"
"npm:@earendil-works/pi-coding-agent" = "latest"
"npm:@oh-my-pi/pi-coding-agent" = "latest"
lazygit = "latest"
glow = "latest"
"aqua:zk-org/zk" = "latest"                      # notes, but cli
"go:golang.org/x/tools/gopls" = "latest"
"npm:agent-browser" = 'latest'                   # browser, but cli
"npm:@justestif/pk" = "latest"                   # notes for ai
"npm:@jx0/wtm" = "latest"                        # worktrees
typst = "0.14.2"                                 # fancy markdown
herdr = "latest"                                 # tmux, but new
rtk = "latest"                                   # filters/compresses command outputs before they reach your LLM context.

[env]
ZK_NOTEBOOK_DIR = "{{env.HOME}}/notes"

[settings]
experimental = true
idiomatic_version_file_enable_tools = ["node"]
locked = false
env_shell_expand = true
npm.package_manager = "bun"
