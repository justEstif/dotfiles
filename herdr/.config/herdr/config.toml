# Herdr config
# Docs: https://herdr.dev/docs/configuration/
# Defaults: herdr --default-config

onboarding = false

[theme]
name = "tokyo-night"
auto_switch = true
light_name = "tokyo-night-day"
dark_name = "tokyo-night"

[ui.toast]
delivery = "herdr"
delay_seconds = 1

[ui.toast.herdr]
position = "bottom-right"

[ui.sound]
enabled = false

[keys]
open_worktree = "prefix+shift+o"
remove_worktree = "prefix+alt+d"

[[keys.command]]
key = "prefix+alt+g"
type = "pane"
command = "lazygit"
description = "lazygit"
