# Herdr config
# Docs: https://herdr.dev/docs/configuration/
# Defaults: herdr --default-config

onboarding = false

# ---- Terminal / rendering ----
# Inline images via the Kitty graphics protocol. Ghostty is compatible.
# (experimental in herdr, but addresses missing image support)
kitty_graphics = true
# Don't force a full redraw every time the terminal regains focus.
# Cuts redraw churn that triggers semantic-frame desyncs in heavy TUIs (nvim + LSP).
redraw_on_focus_gained = false

[theme]
name = "tokyo-night"
auto_switch = true
light_name = "tokyo-night-day"
dark_name = "tokyo-night"

[ui.toast]
delivery = "herdr"
delay_seconds = 1

[ui.toast.herdr]
position = "bottom-right"

[ui.sound]
enabled = false

[keys]
open_worktree = "prefix+shift+o"
remove_worktree = "prefix+alt+d"

[[keys.command]]
key = "prefix+alt+g"
type = "pane"
command = "lazygit"
description = "lazygit"
