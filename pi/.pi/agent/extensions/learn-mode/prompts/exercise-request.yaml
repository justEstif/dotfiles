name: exercise-request
description: Sent as user message when /learn exercise is invoked. Asks the tutor to create an encoding challenge at Bloom's 4-6.
version: 3
variables:
  - topic
  - difficultyTier
  - conceptGraph
  - suggestedConnections
sections:
  challenge_types: |
    Choose an encoding challenge based on the learner's current tier.
    ALL challenges must target Bloom's 4-6 (analyze/evaluate/create), NOT recall or comprehension.

    **If difficulty is "guided":**
    - "Here are two approaches to X — what's the key difference?" (analysis)
    - "I've implemented X two ways. Which is better for [scenario] and why?" (evaluation)
    - "Compare these solutions — one has a subtle problem. Find it." (analysis + evaluation)
    - "Given what you know about A and B, predict which approach would be faster for X." (analysis)

    **If difficulty is "scaffolded":**
    - "Design an approach for X using what you've learned about A and B." (creation)
    - "Here's a solution for X — what are its weaknesses? How would you improve it?" (evaluation)
    - "I need to handle cases A, B, and C. Design a solution, then critique your own approach." (creation + evaluation)
    - "Explain why this approach works for X but would fail for Y." (analysis)

    **If difficulty is "independent":**
    - "Design a system for X. Then identify the three most likely failure modes." (creation + analysis)
    - "Build two different solutions for X, compare their tradeoffs, and recommend one." (creation + evaluation)
    - "Here's a real-world scenario — architect a solution and justify each design decision." (creation + evaluation)
    - "Critique this code: find the design flaw, explain why it's wrong, and propose a better approach." (evaluation + creation)

    **Error analysis variant** (mix in at any level):
    Show code with a design-level mistake (not a syntax error). The learner must:
    1. Identify what's wrong (analysis)
    2. Explain *why* it's a problem — what happens under the hood? (evaluation)
    3. Redesign it properly (creation)

    **Connection challenge variant:**
    "You've learned about A and B. Design a solution for X that combines both concepts."
    This forces interleaving and synthesis.

  instructions: |
    Create an encoding challenge for the learner.

    {{topic}}

    Current difficulty tier: **{{difficultyTier}}**
    Select a challenge type appropriate for this tier (see above).

    {{conceptGraph}}

    {{suggestedConnections}}

    Rules:
    - The challenge must target Bloom's 4-6 (analyze/evaluate/create). NEVER ask the learner to recall a fact or write code from a recipe.
    - It should test ONE concept primarily, but connect to prior knowledge.
    - It should be solvable in 5-15 minutes.
    - Use generation-first: present the problem, let the learner attempt, then provide feedback.
    - If concepts are due for encoding checks, weave a connection question into the challenge.
    - Do NOT provide the solution upfront.
    - After the learner attempts, give targeted feedback that deepens understanding — don't just say "correct/incorrect."
