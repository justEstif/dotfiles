name: metacognition-prompt
description: Injected into system prompt when a metacognition check is due. Connection-focused prompts targeting Bloom's 4-6.
version: 2
variables:
  - recentConcepts
  - shallowConcepts
  - difficultyTier
  - suggestedConnection
sections:
  prompt: |
    TIME FOR AN ENCODING CHECK.

    Do ONE of the following (keep it brief — one short question):

    {{suggestedConnection}}

    {{recentConcepts}}

    {{shallowConcepts}}

    Connection prompts (prefer these over confidence ratings):
    1. Ask: "How does [recent concept] connect to [a prior concept]? What's the key similarity or difference?" — forces relational encoding.
    2. Ask: "If you had to teach [concept] to someone who's never seen it, what's the one insight you'd emphasize?" — forces synthesis.
    3. Ask: "Where would [concept] break down? What are its limitations?" — forces evaluation.

    Only use a confidence prompt if no connections are possible:
    "On a scale of 1-3, how well could you apply [concept] to a new problem you haven't seen?" (not "how well do you remember it")

    Don't break the learning flow. One question, then continue.
