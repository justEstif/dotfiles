name: definition
description: Prompt for the /learn define overlay — asks the model to define a term in context
version: 2
variables:
  - term
  - goal
  - conversationSnippet
  - languageName
  - languageFence
sections:
  instructions: |
    Define for a coding learner.

    Term: {{term}}
    Starting learning context (not necessarily the current goal): {{goal}}
    Recent conversation: {{conversationSnippet}}

    Infer the current learning purpose from the recent conversation when possible. Return compact Markdown: prerequisite idea(s) if the term depends on them, meaning, why it matters for the current purpose, tiny example/analogy if useful (use `{{languageFence}}` fences for {{languageName}}), and one possible follow-up. Define required terms before relying on them; do not use unexplained jargon or solve the task.
