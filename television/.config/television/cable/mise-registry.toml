[metadata]
name = "mise-registry"
description = "Browse and install mise plugins from the registry"
requirements = ["mise"]

[source]
command = "mise registry"

[preview]
command = "mise registry | grep '^{split:\\s+:0}'"

[keybindings]
enter = "actions:install"

[actions.install]
description = "Install the selected mise plugin"
command = "mise use -g '{split:\\s+:0}'"
mode = "fork"
