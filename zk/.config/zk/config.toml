# zk — global configuration.
# Stowed to ~/.config/zk/config.toml. Notebook-local config
# ($ZK_NOTEBOOK_DIR/.zk/config.toml) inherits these settings.
# Notebook is discovered via $ZK_NOTEBOOK_DIR (~/notes).

[notebook]
dir = "~/notes"

# ── Note creation ────────────────────────────────────────────────────────────
[note]
language = "en"
default-title = "Untitled"
# Full timestamp, no separators: 20250115103045  →  unique + chronological.
filename = "{{format-date now '%Y%m%d%H%M%S'}}"
extension = "md"
template = "default.md"

# Daily notes get a date-based filename (overrides the global timestamp scheme).
[group.daily]
paths = ["daily"]

[group.daily.note]
filename = "{{format-date now '%Y-%m-%d'}}"
template = "daily.md"

# ── Markdown format ──────────────────────────────────────────────────────────
[format.markdown]
# Generate [[wikilinks]] (Obsidian-compatible) on insert/link operations.
link-format = "wiki"
link-drop-extension = true
hashtags = true
colon-tags = true

# ── External tools ───────────────────────────────────────────────────────────
[tool]
editor = "nvim"
shell = "/usr/bin/fish"
pager = "less -FIRX"
# `{-1}` expands to the note path. `glow` ships via mise; `bat` is not installed.
fzf-preview = "glow -s auto {-1}"
fzf-line = "{{style 'blue' rel-path}}{{#each tags}} #{{this}}{{/each}} {{style 'black' body}}"

# ── Editor / LSP integration ─────────────────────────────────────────────────
[lsp]
[lsp.diagnostics]
wiki-title = "hint"
# Warn (don't error) on dead links while the notebook is still small.
dead-link = "warning"

# ── Named filters ────────────────────────────────────────────────────────────
[filter]
recents = "--sort created- --created-after 'last two weeks'"

# ── Command aliases ──────────────────────────────────────────────────────────
[alias]
edlast = "zk edit --limit 1 --sort modified- $@"
recent = "zk edit --sort created- --created-after 'last two weeks' --interactive"
lucky = "zk list --quiet --format full --sort random --limit 1"
dn = "zk new --no-input --dir daily $@"
